<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目黒蓮ゲーム</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        #game-container { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #target-image { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        #choices { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        
        /* 選択肢のテキストリンク形式 */
        .choice-link { color: #007AFF; text-decoration: underline; cursor: pointer; font-size: 18px; display: inline-block; }
        .choice-img-trap { max-width: 80px; max-height: 80px; object-fit: cover; cursor: pointer; border: 2px solid #007AFF; vertical-align: middle; border-radius: 5px; }
        
        #result { margin-top: 20px; font-weight: bold; font-size: 24px; min-height: 40px; }
        #combo-count { color: #ff9500; font-size: 20px; margin: 5px 0; font-weight: bold; }
        #answer-name { color: #e91e63; margin: 10px 0; font-size: 20px; }
        button#next-btn { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; display: none; background: #007AFF; color: white; border: none; border-radius: 5px; }

        /* モード切替リンク */
        #mode-toggle-link { color: #666; text-decoration: underline; cursor: pointer; font-size: 14px; margin-bottom: 15px; display: inline-block; }
        
        /* タイマーバー */
        #timer-bar-bg { width: 100%; height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; margin-bottom: 10px; display: none; }
        #timer-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s linear; }
        .loading { font-size: 18px; color: #666; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>目黒蓮ゲーム</h1>

    <div id="mode-toggle-link" onclick="toggleMode()">3秒ルールで遊ぶ</div>

    <div id="timer-bar-bg"><div id="timer-bar"></div></div>

    <div id="loading" class="loading">データを読み込み中...</div>
    <img id="target-image" src="" alt="出題画像" style="display:none;" onclick="checkAnswer(true)">
    <div id="choices"></div>
    
    <div id="result"></div>
    <div id="combo-count"></div> <div id="answer-name"></div>
    <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbySY0Te0BkFNC0ak-sneCwwrm4DJmBHZjAGFcMOzRwnb7v68Syuzmwpd1indUlfASYu8w/exec";
    let quizData = [];
    let currentQuiz = null;
    let timerInterval = null;
    let timeLeft = 3.0;
    let isThreeSecMode = false;
    let combo = 0; // 連続正解数

    async function init() {
        try {
            const response = await fetch(API_URL);
            quizData = await response.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('target-image').style.display = 'inline-block';
            nextQuestion();
        } catch (e) {
            document.getElementById('loading').innerText = "読み込み失敗";
        }
    }

    function toggleMode() {
        isThreeSecMode = !isThreeSecMode;
        const link = document.getElementById('mode-toggle-link');
        link.innerText = isThreeSecMode ? "通常版で遊ぶ" : "3秒ルールで遊ぶ";
        combo = 0; // モードを変えたらコンボリセット
        nextQuestion();
    }

    function nextQuestion() {
        clearInterval(timerInterval);
        document.getElementById('result').innerText = "";
        document.getElementById('answer-name').innerText = "";
        document.getElementById('combo-count').innerText = combo > 0 ? combo + "問連続正解中！" : "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('choices').innerHTML = "";
        
        document.getElementById('timer-bar-bg').style.display = isThreeSecMode ? "block" : "none";

        currentQuiz = quizData[Math.floor(Math.random() * quizData.length)];
        document.getElementById('target-image').src = currentQuiz.image_url;

        const choiceCount = Math.floor(Math.random() * 3) + 6; 
        let displayChoices = [{ text: currentQuiz.name, isCorrect: true, isImage: false }];

        if (currentQuiz.aliases && currentQuiz.aliases.length > 0) {
            const extra = [...currentQuiz.aliases].sort(() => Math.random() - 0.5).slice(0, 2);
            extra.forEach(a => displayChoices.push({ text: a, isCorrect: true, isImage: false }));
        }

        let others = quizData.filter(d => d.name !== currentQuiz.name).sort(() => Math.random() - 0.5);
        while (displayChoices.length < choiceCount) {
            let fake = others.pop();
            if(!fake) break;
            displayChoices.push({ text: fake.name, isCorrect: false, isImage: false, trapUrl: fake.image_url });
        }

        const trapIndex = Math.floor(Math.random() * displayChoices.length);
        const hasTrap = Math.random() > 0.3;
        displayChoices.sort(() => Math.random() - 0.5);

        displayChoices.forEach((c, i) => {
            const el = document.createElement('div');
            if (hasTrap && i === trapIndex) {
                const img = document.createElement('img');
                img.src = c.isCorrect ? currentQuiz.image_url : (c.trapUrl || currentQuiz.image_url);
                img.className = "choice-img-trap";
                img.onclick = () => checkAnswer(c.isCorrect);
                el.appendChild(img);
            } else {
                const span = document.createElement('span');
                span.innerText = c.text;
                span.className = "choice-link";
                span.onclick = () => checkAnswer(c.isCorrect);
                el.appendChild(span);
            }
            document.getElementById('choices').appendChild(el);
        });

        if (isThreeSecMode) startTimer();
    }

    function startTimer() {
        timeLeft = 3.0;
        const bar = document.getElementById('timer-bar');
        bar.style.width = "100%";
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            bar.style.width = (timeLeft / 3.0 * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                checkAnswer(false, "時間切れ！");
            }
        }, 100);
    }

    function checkAnswer(isCorrect, message) {
        if (document.getElementById('next-btn').style.display === "block") return;
        clearInterval(timerInterval);

        const resultEl = document.getElementById('result');
        const comboEl = document.getElementById('combo-count');

        if (isCorrect) {
            combo++;
            resultEl.innerText = "⭕ 正解！";
            resultEl.style.color = "#4CAF50";
            comboEl.innerText = combo + "問連続正解中！";
        } else {
            resultEl.innerText = message ? "⌛ " + message : "❌ 不正解...";
            resultEl.style.color = "#F44336";
            comboEl.innerText = combo > 0 ? "今回は " + combo + " 連チャンでした！" : "";
            combo = 0; // 不正解でリセット
        }

        document.getElementById('answer-name').innerText = "正解は: " + currentQuiz.name;
        document.getElementById('next-btn').style.display = "block";
    }

    init();
</script>
</body>
</html>
